name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify production index.html
        run: |
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "ERROR: dist references source files"
            exit 1
          fi
          echo "OK: production build is valid"

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: dist/index.html,dist/assets/*,dist/favicon.svg,dist/icons.svg
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
