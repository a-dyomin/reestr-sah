name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify production build
        run: |
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "ERROR: dist references source files"
            exit 1
          fi
          ls dist/assets/*.js dist/assets/*.css
          echo "OK: production build is valid"

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-gh-pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
