# Nginx для demosah.izhon.ru
#
# ВАЖНО: в root должно лежать содержимое dist/ (index.html + папка assets/)
# НЕ ветка main из Git — там исходники!

server {
    listen 80;
    listen 443 ssl;
    server_name demosah.izhon.ru;

    # Каталог с содержимым dist/ (ветка gh-pages или результат сборки)
    root /var/www/demosah.izhon.ru;
    index index.html;

    # Статика: НЕ отдавать index.html вместо отсутствующих файлов
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.svg {
        try_files $uri =404;
    }

    location = /icons.svg {
        try_files $uri =404;
    }

    # SPA: только для страниц, не для статики
    location / {
        try_files $uri $uri/ /index.html;
    }
}
