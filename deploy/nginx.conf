# Пример конфигурации для demosah.izhon.ru
# Раздавать содержимое папки dist/ (НЕ исходники проекта)

server {
    listen 80;
    listen 443 ssl;
    server_name demosah.izhon.ru;

    root /var/www/demosah.izhon.ru;
    index index.html;

    # Статика с правильными MIME-типами
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA: все маршруты → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Запрет доступа к исходникам, если они случайно попали на сервер
    location ~* \.(tsx?|jsx?)$ {
        if ($uri !~* ^/assets/.*\.js$) {
            return 404;
        }
    }
}
