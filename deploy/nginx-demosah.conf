# demosah.izhon.ru — полный конфиг nginx
#
# Проблема «белый экран»: nginx отдаёт index.html вместо .js/.css
# Причина: неверный root ИЛИ try_files подставляет index.html для /assets/

server {
    listen 80;
    listen 443 ssl;
    server_name demosah.izhon.ru;

    # ← ОБЯЗАТЕЛЬНО именно dist, не /opt/demosah и не /opt/demosah/repo
    root /opt/demosah/dist;
    index index.html;

    # Статика: без fallback на index.html
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.svg {
        try_files $uri =404;
    }

    location = /icons.svg {
        try_files $uri =404;
    }

    # SPA — только для HTML-страниц
    location / {
        try_files $uri $uri/ /index.html;
    }
}
